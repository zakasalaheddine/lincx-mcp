# fly.toml app configuration file generated for lincx-mcp on 2026-04-21T20:23:18+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lincx-mcp'
primary_region = 'cdg'

[build]

[env]
  IDENTITY_SERVER = 'https://ix-id.lincx.la'
  NODE_ENV = 'production'
  PORT = '3000'
  PUBLIC_BASE_URL = 'https://lincx-mcp.fly.dev'
  TRANSPORT = 'http'
  WORK_API_BASE_URL = 'https://api.lincx.com'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
